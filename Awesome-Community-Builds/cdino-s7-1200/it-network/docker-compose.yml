name: it-homelab

secrets:
  influxdb_admin_password:
    file: ./secrets/influxdb_admin_password
  influxdb_token:
    file: ./secrets/influxdb_token

volumes:
  influxdb-data:
  influxdb-config:
  grafana-data:
  caddy-data:
  caddy-config:

networks:
  it-stack:
    driver: bridge
    internal: false

services:

  caddy:
    image: caddy:2-alpine
    container_name: caddy-it
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - it-stack
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 10s
      retries: 3

  influxdb:
    image: influxdb:2-alpine
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "127.0.0.1:8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_ADMIN_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD_FILE: /run/secrets/influxdb_admin_password
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-homelab}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-factory-data}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN_FILE: /run/secrets/influxdb_token
      TZ: ${TZ:-Europe/London}
    secrets:
      - influxdb_admin_password
      - influxdb_token
    networks:
      - it-stack
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  telegraf:
    image: telegraf:1.34-alpine
    container_name: telegraf
    restart: unless-stopped
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    environment:
      TZ: ${TZ:-Europe/London}
      INFLUX_TOKEN: ${INFLUX_TOKEN}
    secrets:
      - influxdb_token
    networks:
      - it-stack
    depends_on:
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "telegraf", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://grafana.home.lab
      GF_SERVER_DOMAIN: grafana.home.lab
      TZ: ${TZ:-Europe/London}
    networks:
      - it-stack
    depends_on:
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s